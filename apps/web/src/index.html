<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ElderCare App</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="settings">
    <h2>Settings</h2>
    <label for="role">Select Role:</label>
    <select id="role" onchange="updateRole()">
      <option value="caregiver">Caregiver</option>
      <option value="elder">Elder</option>
    </select>
    <div id="pair-code" class="pair-code"></div>
  </div>
  <div class="status-card" style="display: none;">
    <h3>Dashboard</h3>
    <p>Paired With:</p>
    <p>Last Check-In:</p>
  </div>
  <script src="/settings.js"></script>
</body>
</html>
